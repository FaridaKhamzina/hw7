services:
  app-blue:
    build:
      context: .
      args:
        MODEL_VERSION: v1.0.0
    image: ml-service:v1.0.0
    environment:
      MODEL_VERSION: v1.0.0
    ports:
      - "8001:8000"

  app-green:
    build:
      context: .
      args:
        MODEL_VERSION: v1.1.0
    image: ml-service:v1.1.0
    environment:
      MODEL_VERSION: v1.1.0
    ports:
      - "8002:8000"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - app-blue
      - app-green
    ports:
      - "8080:80"
    volumes:
      - ./nginx/canary.conf:/etc/nginx/conf.d/default.conf:ro
